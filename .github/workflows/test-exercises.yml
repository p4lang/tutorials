name: P4 Tutorials CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
# Add concurrency so only most recent push have CI
concurrency:
  group: p4-tutorials-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-licenses:
    runs-on: ubuntu-latest
    name: Validate that all files have copyright and license info
    steps:
      - uses: actions/checkout@v6
      - name: Install REUSE
        run: |
          ./CI/install-uv.sh
      - name: Validate presence of copyright and license info (python w/reuse)
        run: |
          uvx reuse lint
  test-exercise:
    timeout-minutes: 30   
    runs-on: ubuntu-latest
    # We use need a privileged container because P4 tests need to create veth interfaces
    container:
      image: p4lang/p4c:latest
      options: --privileged
    strategy:
      matrix:
        exercise: [basic, basic_tunnel]    # Add more exercises here for future tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y make python3-pip sudo libboost-iostreams-dev libboost-graph-dev
          #./CI/install-uv.sh
          #echo "Just before: uv venv"
          #cd $HOME
          #uv venv
          #echo "ls -la $HOME"
          #echo "--------------------"
          #ls -la $HOME
          #echo "--------------------"
          #export PATH="${PATH}:${HOME}/.venv/bin"
          pip3 list -v
          echo "Just before: uv pip install protobuf==3.20.3"
          uv pip install protobuf==3.20.3
          echo "Just before: uv pip install grpcio"
          uv pip install grpcio
          echo "Just before: uv pip install grpcio-tools googleapis-common-protos scapy ptf"
          uv pip install grpcio-tools googleapis-common-protos scapy ptf
          pip3 list -v
          echo "which ptf:"
          which ptf
          #echo "ls -la $HOME"
          #echo "--------------------"
          #ls -la $HOME
          #echo "--------------------"
          #echo "ls -la $HOME/.venv/bin"
          #echo "--------------------"
          #ls -la $HOME/.venv/bin
          #echo "--------------------"

      - name: Run PTF Tests
        run: |
          cd exercises/${{ matrix.exercise }}
          echo "Got here #1"
          pip3 list -v
          echo "which ptf:"
          which ptf
          #export PATH="${PATH}:${HOME}/.venv/bin"
          #echo "Got here #2"
          echo "HOME=${HOME}"
          echo "PATH=${PATH}"
          #echo "ls -la $HOME"
          #echo "--------------------"
          #ls -la $HOME
          #echo "--------------------"
          #echo "ls -la $HOME/.venv/bin"
          #echo "--------------------"
          #ls -la $HOME/.venv/bin
          #echo "--------------------"
          #uvx make test
          make test
        # Retain logs in case runs fail
      - name: Upload Logs
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: p4-logs-${{ matrix.exercise }}
          path: exercises/${{ matrix.exercise }}/logs/

