name: P4 Tutorials CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
# Add concurrency so only most recent push have CI
concurrency:
  group: p4-tutorials-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-licenses:
    runs-on: ubuntu-latest
    name: Validate that all files have copyright and license info
    steps:
      - uses: actions/checkout@v6
      - name: Install REUSE
        run: |
          ./CI/setup-uv.sh
          uv pip install reuse
      - name: Validate presence of copyright and license info (python w/reuse)
        run: |
          uv run reuse lint
  test-exercise:
    timeout-minutes: 30   
    runs-on: ubuntu-latest
    # We use need a privileged container because P4 tests need to create veth interfaces
    container:
      image: p4lang/p4c:latest
      options: --privileged
    strategy:
      matrix:
        exercise: [basic, basic_tunnel]    # Add more exercises here for future tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y make python3-pip python3-venv sudo libboost-iostreams-dev libboost-graph-dev
          echo "which simple_switch_grpc"
          which simple_switch_grpc
          echo "which p4c"
          which p4c
          echo "HOME=${HOME}"
          #python3 -m venv ${HOME}/p4dev-venv --system-site-packages
          #source ${HOME}/p4dev-venv/bin/activate
          echo "id:"
          id
          echo "VIRTUAL_ENV=${VIRTUAL_ENV}"
          echo "----------------------------------------"
          find / -name site-packages -o -name dist-packages
          echo "----------------------------------------"
          echo "ls -la /usr/lib/python3/dist-packages"
          echo "----------------------------------------"
          ls -la /usr/lib/python3/dist-packages
          echo "----------------------------------------"
          echo "ls -la /usr/local/lib/python3.12/dist-packages"
          echo "----------------------------------------"
          ls -la /usr/local/lib/python3.12/dist-packages
          echo "----------------------------------------"
          echo "ls -la /usr/local/lib/python3.12/site-packages"
          echo "----------------------------------------"
          ls -la /usr/local/lib/python3.12/site-packages
          echo "----------------------------------------"
          python3 -c 'import sys; print(sys.path)'
          #find / -name site-packages -o -name dist-packages | xargs ls -la
          #find / | egrep '(site-packages|dist-packages)'
          echo "pip3 list -v"
          pip3 list -v
          echo "PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages pip3 list -v"
          PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages pip3 list -v
          echo "PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages sudo pip3 install protobuf==3.20.3 grpcio googleapis-common-protos scapy ptf"
          PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages sudo pip3 install protobuf==3.20.3 grpcio googleapis-common-protos scapy ptf
          echo "pip3 list -v"
          pip3 list -v
          echo "PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages pip3 list -v"
          PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages pip3 list -v
          echo "----------------------------------------"
          find / -name site-packages -o -name dist-packages
          echo "----------------------------------------"
          echo "ls -la /usr/lib/python3/dist-packages"
          echo "----------------------------------------"
          ls -la /usr/lib/python3/dist-packages
          echo "----------------------------------------"
          echo "ls -la /usr/local/lib/python3.12/dist-packages"
          echo "----------------------------------------"
          ls -la /usr/local/lib/python3.12/dist-packages
          echo "----------------------------------------"
          echo "ls -la /usr/local/lib/python3.12/site-packages"
          echo "----------------------------------------"
          ls -la /usr/local/lib/python3.12/site-packages
          echo "----------------------------------------"
          echo "which ptf"
          which ptf

      - name: Run PTF Tests
        run: |
          cd exercises/${{ matrix.exercise }}
          echo "PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages pip3 list -v"
          PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages pip3 list -v
          PYTHONPATH=/usr/local/lib/python3.12/site-packages:/usr/local/lib/python3.12/dist-packages:/usr/lib/python3/dist-packages make test
        # Retain logs in case runs fail
      - name: Upload Logs
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: p4-logs-${{ matrix.exercise }}
          path: exercises/${{ matrix.exercise }}/logs/

